<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edge embed CPU test</title>
<style>
  html,body{margin:0;height:100%;background:#000;font-family:system-ui,sans-serif;color:#ccc}
  .bar{height:44px;display:flex;align-items:center;gap:14px;padding:0 14px;background:#111}
  .bar b{color:#fff}
  .wrap{position:relative;width:100%;height:calc(100% - 44px);background:#000}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
  <div class="bar">
    <b>Чистый YouTube-embed (без нашего кода).</b>
    <span>Открой в Edge, дай доиграть 20–30 сек, посмотри CPU процесса Edge в Task Manager.</span>
  </div>
  <div class="wrap">
    <!-- Голый iframe-embed, никакого нашего JS, оверлеев и трансформов -->
    <iframe
      src="https://www.youtube.com/embed/M7lc1UVf-VE?autoplay=1&mute=1&rel=0&iv_load_policy=3&modestbranding=1&playsinline=1"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen></iframe>
  </div>
</body>
</html>
